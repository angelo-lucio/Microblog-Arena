<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" fill="none">
  <rect width="1200" height="680" fill="#020617"/>
  <text x="600" y="68" text-anchor="middle" fill="#67e8f9" font-family="Arial, sans-serif" font-size="32" font-weight="700">Post Moderation Flow</text>

  <rect x="80" y="170" width="210" height="95" rx="10" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <text x="185" y="225" text-anchor="middle" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="18" font-weight="700">User Creates Post</text>

  <rect x="340" y="170" width="230" height="95" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <text x="455" y="210" text-anchor="middle" fill="#cffafe" font-family="Arial, sans-serif" font-size="18" font-weight="700">API Writes DB</text>
  <text x="455" y="236" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">sentiment = pending</text>

  <rect x="620" y="170" width="230" height="95" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="735" y="225" text-anchor="middle" fill="#fde68a" font-family="Arial, sans-serif" font-size="18" font-weight="700">Queue Job Added</text>

  <rect x="900" y="170" width="220" height="95" rx="10" fill="#0f172a" stroke="#f472b6" stroke-width="2"/>
  <text x="1010" y="225" text-anchor="middle" fill="#fbcfe8" font-family="Arial, sans-serif" font-size="18" font-weight="700">Worker + Ollama</text>

  <rect x="340" y="380" width="230" height="95" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
  <text x="455" y="420" text-anchor="middle" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="18" font-weight="700">Success Path</text>
  <text x="455" y="445" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">ok / negative / dangerous</text>

  <rect x="640" y="380" width="230" height="95" rx="10" fill="#0f172a" stroke="#fb923c" stroke-width="2"/>
  <text x="755" y="420" text-anchor="middle" fill="#fed7aa" font-family="Arial, sans-serif" font-size="18" font-weight="700">Retry Path</text>
  <text x="755" y="445" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">3 attempts + backoff</text>

  <rect x="900" y="380" width="220" height="95" rx="10" fill="#0f172a" stroke="#ef4444" stroke-width="2"/>
  <text x="1010" y="420" text-anchor="middle" fill="#fecaca" font-family="Arial, sans-serif" font-size="18" font-weight="700">Fallback</text>
  <text x="1010" y="445" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">sentiment = error</text>

  <line x1="290" y1="218" x2="340" y2="218" stroke="#67e8f9" stroke-width="3"/>
  <line x1="570" y1="218" x2="620" y2="218" stroke="#67e8f9" stroke-width="3"/>
  <line x1="850" y1="218" x2="900" y2="218" stroke="#67e8f9" stroke-width="3"/>
  <line x1="1010" y1="265" x2="1010" y2="380" stroke="#67e8f9" stroke-width="3"/>
  <line x1="980" y1="265" x2="755" y2="380" stroke="#67e8f9" stroke-width="3"/>
  <line x1="950" y1="265" x2="455" y2="380" stroke="#67e8f9" stroke-width="3"/>

  <text x="600" y="620" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">Frontend auto-refresh shows status and correction updates</text>
</svg>
