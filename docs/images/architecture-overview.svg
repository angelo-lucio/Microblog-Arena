<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" fill="none">
  <rect width="1200" height="680" fill="#020617"/>
  <text x="600" y="70" text-anchor="middle" fill="#67e8f9" font-family="Arial, sans-serif" font-size="34" font-weight="700">Microblog-API Architecture</text>

  <rect x="70" y="140" width="220" height="120" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <text x="180" y="195" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="22" font-weight="700">Nuxt 3</text>
  <text x="180" y="225" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">Frontend :4000</text>

  <rect x="360" y="140" width="250" height="120" rx="10" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <text x="485" y="195" text-anchor="middle" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="22" font-weight="700">Nginx</text>
  <text x="485" y="225" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">Load Balancer :80</text>

  <rect x="680" y="90" width="230" height="95" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <text x="795" y="140" text-anchor="middle" fill="#cffafe" font-family="Arial, sans-serif" font-size="18" font-weight="700">Express API #1</text>

  <rect x="680" y="200" width="230" height="95" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <text x="795" y="250" text-anchor="middle" fill="#cffafe" font-family="Arial, sans-serif" font-size="18" font-weight="700">Express API #2</text>

  <rect x="970" y="140" width="180" height="120" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
  <text x="1060" y="188" text-anchor="middle" fill="#fde68a" font-family="Arial, sans-serif" font-size="20" font-weight="700">Redis</text>
  <text x="1060" y="215" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">Cache + Queue</text>

  <rect x="360" y="360" width="250" height="120" rx="10" fill="#0f172a" stroke="#34d399" stroke-width="2"/>
  <text x="485" y="415" text-anchor="middle" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="22" font-weight="700">PostgreSQL</text>
  <text x="485" y="445" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">Drizzle ORM</text>

  <rect x="680" y="360" width="250" height="120" rx="10" fill="#0f172a" stroke="#f472b6" stroke-width="2"/>
  <text x="805" y="415" text-anchor="middle" fill="#fbcfe8" font-family="Arial, sans-serif" font-size="22" font-weight="700">Sentiment Worker</text>
  <text x="805" y="445" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">BullMQ Worker</text>

  <rect x="970" y="360" width="180" height="120" rx="10" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
  <text x="1060" y="415" text-anchor="middle" fill="#ddd6fe" font-family="Arial, sans-serif" font-size="20" font-weight="700">Ollama</text>
  <text x="1060" y="445" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">AI Moderation</text>

  <line x1="290" y1="200" x2="360" y2="200" stroke="#67e8f9" stroke-width="3"/>
  <line x1="610" y1="200" x2="680" y2="140" stroke="#67e8f9" stroke-width="3"/>
  <line x1="610" y1="200" x2="680" y2="250" stroke="#67e8f9" stroke-width="3"/>
  <line x1="910" y1="140" x2="970" y2="180" stroke="#67e8f9" stroke-width="3"/>
  <line x1="910" y1="248" x2="970" y2="220" stroke="#67e8f9" stroke-width="3"/>
  <line x1="760" y1="295" x2="760" y2="360" stroke="#67e8f9" stroke-width="3"/>
  <line x1="680" y1="420" x2="610" y2="420" stroke="#67e8f9" stroke-width="3"/>
  <line x1="930" y1="420" x2="970" y2="420" stroke="#67e8f9" stroke-width="3"/>

  <text x="600" y="620" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">Frontend -> Nginx -> API replicas -> Redis/PostgreSQL, AI via Worker + Ollama</text>
